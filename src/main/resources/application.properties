spring.application.name=wishmegift
spring.jpa.show-sql=true

# Décommenter lors de la mise en place de la base de données
# Changer les identifiants de la base de données ici
spring.datasource.url=jdbc:postgresql://localhost:5432/blankmilitia-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create

# Décommenter pour afficher les requętes SQL réalisées
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
